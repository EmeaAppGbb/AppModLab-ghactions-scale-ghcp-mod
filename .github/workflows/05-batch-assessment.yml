# ============================================================================
# 05-batch-assessment.yml — Full Batch Run
# ============================================================================
# Orchestrates the full pipeline: discover repos → filter by language and
# blacklist → assess each repo → create PRs.  Uses a matrix strategy with
# max-parallel to respect rate limits.
#
# Repository variables:
#   TARGET_ORG        — GitHub organization to scan
#   BLACKLIST_REPOS   — Comma-separated list of repo names to exclude
#   TARGET_LANGUAGES  — Default language filter (java/dotnet/both)
#   MODERNIZE_MODEL   — (optional) LLM model for the modernize CLI
#
# Secrets:
#   GH_PAT — Personal Access Token with repo + org:read scopes
# ============================================================================

name: "05 · Batch Assessment"

on:
  workflow_dispatch:
    inputs:
      language_filter:
        description: "Language filter"
        required: true
        type: choice
        options:
          - java
          - dotnet
          - both
        default: both
      dry_run:
        description: "Dry run — discover and filter only, do NOT run assessments"
        required: false
        type: boolean
        default: true
      max_repos:
        description: "Maximum repos to process (safety limit)"
        required: false
        type: number
        default: 5

# Only one batch run at a time
concurrency:
  group: batch-assessment
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Phase 1 — Discover & Filter
  # ════════════════════════════════════════════════════════════════════════
  discover-and-filter:
    name: "Discover & filter repos"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      matrix: ${{ steps.matrix.outputs.repos }}
      count: ${{ steps.matrix.outputs.count }}
      estimated_minutes: ${{ steps.eta.outputs.estimated_minutes }}

    env:
      ORG: ${{ vars.TARGET_ORG }}
      BLACKLIST: ${{ vars.BLACKLIST_REPOS }}
      LANG_FILTER: ${{ inputs.language_filter || vars.TARGET_LANGUAGES || 'both' }}
      MAX_REPOS: ${{ inputs.max_repos }}
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Check for concurrent batch runs
        run: |
          RUNNING=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "05-batch-assessment.yml" \
            --status in_progress \
            --json databaseId \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }})] | length")

          QUEUED=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "05-batch-assessment.yml" \
            --status queued \
            --json databaseId \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }})] | length")

          if [[ "$RUNNING" -gt 0 || "$QUEUED" -gt 0 ]]; then
            echo "::warning::⚠️ Another batch assessment is already running or queued (${RUNNING} running, ${QUEUED} queued). This run will be serialized by the concurrency group."
          else
            echo "✅ No other batch runs detected."
          fi

      - name: Validate inputs
        run: |
          if [[ -z "$ORG" ]]; then
            echo "::error::TARGET_ORG repo variable is not set."
            exit 1
          fi
          echo "🏢 Organization: $ORG"
          echo "🔤 Language filter: $LANG_FILTER"
          echo "🚫 Blacklist: ${BLACKLIST:-<none>}"
          echo "🔢 Max repos: $MAX_REPOS"

      - name: Fetch and filter repos
        id: matrix
        run: |
          # 1. Fetch all non-archived repos
          gh repo list "$ORG" \
            --json name,primaryLanguage \
            --limit 1000 \
            --no-archived \
            > all_repos.json

          echo "📦 Total repos: $(jq length all_repos.json)"

          # 2. Apply language filter
          case "$LANG_FILTER" in
            java)
              FILTER='.primaryLanguage.name == "Java"'
              ;;
            dotnet)
              FILTER='(.primaryLanguage.name == "C#") or (.primaryLanguage.name == "F#") or (.primaryLanguage.name == "Visual Basic .NET")'
              ;;
            both)
              FILTER='(.primaryLanguage.name == "Java") or (.primaryLanguage.name == "C#") or (.primaryLanguage.name == "F#") or (.primaryLanguage.name == "Visual Basic .NET")'
              ;;
          esac

          jq "[ .[] | select($FILTER) ]" all_repos.json > lang_filtered.json
          echo "🔤 After language filter: $(jq length lang_filtered.json)"

          # 3. Apply blacklist
          if [[ -n "$BLACKLIST" ]]; then
            BLACKLIST_JSON=$(echo "$BLACKLIST" | tr ',' '\n' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | jq -R . | jq -s .)
            jq --argjson bl "$BLACKLIST_JSON" \
              '[ .[] | select(.name as $n | ($bl | index($n)) | not) ]' \
              lang_filtered.json > filtered.json
          else
            cp lang_filtered.json filtered.json
          fi

          echo "✅ After blacklist: $(jq length filtered.json)"

          # 4. Apply max_repos safety limit
          jq --argjson max "$MAX_REPOS" '.[0:$max]' filtered.json > final.json

          # 5. Build the matrix JSON — a list of repo names
          REPO_LIST=$(jq -c '[ .[].name ]' final.json)
          COUNT=$(jq length final.json)

          echo "repos=$REPO_LIST" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          echo "🎯 Will process $COUNT repo(s): $REPO_LIST"

      - name: Write discovery summary
        run: |
          COUNT=${{ steps.matrix.outputs.count }}

          {
            echo "## 📋 Batch Assessment — Discovery Phase"
            echo ""
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "> ⚠️ **DRY RUN** — Assessments will NOT run."
              echo ""
            fi
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| Organization | \`$ORG\` |"
            echo "| Language filter | \`$LANG_FILTER\` |"
            echo "| Blacklist | \`${BLACKLIST:-<none>}\` |"
            echo "| Max repos | \`$MAX_REPOS\` |"
            echo "| **Repos to process** | **$COUNT** |"
            echo ""
            echo "### 🎯 Target repos"
            echo ""
            echo "| # | Repository |"
            echo "|---|-----------|"
            jq -r 'to_entries[] | "| \(.key + 1) | \(.value.name) |"' final.json
            echo ""
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "> Re-run with **dry_run: false** to execute assessments."
            fi
            echo ""
            echo "_Run at $(date -u '+%Y-%m-%d %H:%M UTC') by @${{ github.actor }}_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Estimate time remaining
        id: eta
        run: |
          COUNT=${{ steps.matrix.outputs.count }}
          MAX_PARALLEL=3
          # ~8 min per repo for assessment, ~2 min per repo for PR creation
          ASSESS_MIN=8
          PR_MIN=2

          if [[ "${{ inputs.dry_run }}" == "true" || "$COUNT" -eq 0 ]]; then
            echo "estimated_minutes=0" >> "$GITHUB_OUTPUT"
            echo "⏱️ Dry run or zero repos — no assessment time needed."
          else
            BATCHES=$(( (COUNT + MAX_PARALLEL - 1) / MAX_PARALLEL ))
            ASSESS_TIME=$(( BATCHES * ASSESS_MIN ))
            PR_TIME=$(( BATCHES * PR_MIN ))
            TOTAL=$(( ASSESS_TIME + PR_TIME ))
            echo "estimated_minutes=$TOTAL" >> "$GITHUB_OUTPUT"
            echo "⏱️ Estimated time: ~${TOTAL} min (${COUNT} repos in ${BATCHES} batches of ${MAX_PARALLEL})"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> ⏱️ **Estimated time remaining:** ~${TOTAL} minutes (${BATCHES} batch(es) × ${MAX_PARALLEL} parallel)" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ════════════════════════════════════════════════════════════════════════
  # Phase 2 — Run Assessments (matrix job, skipped on dry run)
  # ════════════════════════════════════════════════════════════════════════
  assess:
    name: "Assess ${{ matrix.repo }}"
    needs: discover-and-filter
    if: inputs.dry_run == false && needs.discover-and-filter.outputs.count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        repo: ${{ fromJson(needs.discover-and-filter.outputs.matrix) }}

    env:
      ORG: ${{ vars.TARGET_ORG }}
      MODEL: ${{ vars.MODERNIZE_MODEL }}
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Install modernize CLI
        run: |
          echo "📦 Installing modernize CLI ..."
          npm install -g @modernize/cli
          echo "✅ Installed."

      - name: Clone ${{ matrix.repo }}
        run: |
          gh repo clone "$ORG/${{ matrix.repo }}" target-repo
          echo "✅ Cloned $ORG/${{ matrix.repo }}."

      - name: Create ghcp-mod branch
        working-directory: target-repo
        run: |
          if git ls-remote --heads origin ghcp-mod | grep -q ghcp-mod; then
            git fetch origin ghcp-mod
            git checkout ghcp-mod
            echo "ℹ️  Checked out existing ghcp-mod branch."
          else
            git checkout -b ghcp-mod
            echo "🆕 Created new ghcp-mod branch."
          fi

      - name: Run assessment
        working-directory: target-repo
        run: |
          CMD="modernize assess --source . --output-path ./ghcp-mod-assessment --no-tty"
          if [[ -n "$MODEL" ]]; then
            CMD="$CMD --model $MODEL"
          fi
          echo "▶️ $CMD"
          eval "$CMD"

          if [[ ! -d ./ghcp-mod-assessment ]]; then
            echo "::error::Assessment output not found!"
            exit 1
          fi
          echo "✅ Assessment complete."

      - name: Commit and push
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ghcp-mod-assessment/
          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit."
          else
            git commit -m "🔍 Add GHCP modernization assessment

          Automated assessment for $ORG/${{ matrix.repo }}.
          Model: ${MODEL:-default}"
          fi

          git push origin ghcp-mod --force-with-lease
          echo "✅ Pushed ghcp-mod branch."

      - name: Record assessment status
        if: always()
        run: |
          mkdir -p /tmp/batch-status
          STATUS="${{ job.status }}"
          jq -n \
            --arg repo "${{ matrix.repo }}" \
            --arg assess_status "$STATUS" \
            '{repo: $repo, assess_status: $assess_status}' \
            > "/tmp/batch-status/assess-${{ matrix.repo }}.json"

      - name: Upload assessment status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assess-status-${{ matrix.repo }}
          path: /tmp/batch-status/assess-${{ matrix.repo }}.json
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════
  # Phase 3 — Create PRs (runs after all assessments complete)
  # ════════════════════════════════════════════════════════════════════════
  create-prs:
    name: "Create PR for ${{ matrix.repo }}"
    needs: [discover-and-filter, assess]
    if: inputs.dry_run == false && needs.discover-and-filter.outputs.count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        repo: ${{ fromJson(needs.discover-and-filter.outputs.matrix) }}

    env:
      ORG: ${{ vars.TARGET_ORG }}
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Check for existing PR
        id: check
        run: |
          EXISTING=$(gh pr list \
            --repo "$ORG/${{ matrix.repo }}" \
            --head ghcp-mod \
            --base main \
            --json url \
            --jq '.[0].url // ""')

          if [[ -n "$EXISTING" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "url=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "ℹ️  PR already exists: $EXISTING"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        id: create
        if: steps.check.outputs.exists == 'false'
        run: |
          PR_TITLE="🔍 GHCP Modernization Assessment — ${{ matrix.repo }}"

          PR_BODY="## 🔍 GHCP Modernization Assessment

          This PR contains an automated modernization assessment for \`$ORG/${{ matrix.repo }}\`.

          ### 📂 What's included
          - Assessment report in \`ghcp-mod-assessment/\`

          ### 📋 Next steps
          1. Review the assessment findings
          2. Run \`modernize plan create\` for a detailed migration plan
          3. Prioritize quick wins vs. larger efforts
          4. Merge or close as appropriate

          ---
          > 🤖 _Automated by GitHub Actions batch assessment pipeline._"

          PR_URL=$(gh pr create \
            --repo "$ORG/${{ matrix.repo }}" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head ghcp-mod)

          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "✅ PR created: $PR_URL"

      - name: Add labels
        if: steps.check.outputs.exists == 'false'
        run: |
          for LABEL in "ghcp-mod" "assessment"; do
            gh label create "$LABEL" \
              --repo "$ORG/${{ matrix.repo }}" \
              --description "GHCP Modernization" \
              --color "0E8A16" \
              --force 2>/dev/null || true
          done

          PR_URL="${{ steps.create.outputs.url }}"
          PR_NUMBER=$(basename "$PR_URL")
          gh pr edit "$PR_NUMBER" \
            --repo "$ORG/${{ matrix.repo }}" \
            --add-label "ghcp-mod,assessment"

      - name: Job summary
        run: |
          if [[ "${{ steps.check.outputs.exists }}" == "true" ]]; then
            URL="${{ steps.check.outputs.url }}"
            MSG="PR already existed"
          else
            URL="${{ steps.create.outputs.url }}"
            MSG="PR created"
          fi

          {
            echo "### ${{ matrix.repo }}"
            echo "- **Status:** $MSG"
            echo "- **PR:** [$URL]($URL)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record PR status
        if: always()
        run: |
          mkdir -p /tmp/batch-status

          if [[ "${{ steps.check.outputs.exists }}" == "true" ]]; then
            PR_URL="${{ steps.check.outputs.url }}"
            PR_STATUS="already_existed"
          elif [[ -n "${{ steps.create.outputs.url }}" ]]; then
            PR_URL="${{ steps.create.outputs.url }}"
            PR_STATUS="created"
          else
            PR_URL=""
            PR_STATUS="failed"
          fi

          jq -n \
            --arg repo "${{ matrix.repo }}" \
            --arg pr_status "$PR_STATUS" \
            --arg pr_url "$PR_URL" \
            --arg job_status "${{ job.status }}" \
            '{repo: $repo, pr_status: $pr_status, pr_url: $pr_url, job_status: $job_status}' \
            > "/tmp/batch-status/pr-${{ matrix.repo }}.json"

      - name: Upload PR status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-status-${{ matrix.repo }}
          path: /tmp/batch-status/pr-${{ matrix.repo }}.json
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════
  # Phase 4 — Final Summary
  # ════════════════════════════════════════════════════════════════════════
  summary:
    name: "Batch summary"
    needs: [discover-and-filter, assess, create-prs]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Download assessment status artifacts
        if: needs.assess.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          pattern: assess-status-*
          path: /tmp/assess-status
          merge-multiple: true
        continue-on-error: true

      - name: Download PR status artifacts
        if: needs.create-prs.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          pattern: pr-status-*
          path: /tmp/pr-status
          merge-multiple: true
        continue-on-error: true

      - name: Build results table
        id: results
        run: |
          REPO_LIST='${{ needs.discover-and-filter.outputs.matrix }}'
          COUNT=${{ needs.discover-and-filter.outputs.count || 0 }}

          # Start building the markdown table
          TABLE="| # | Repository | Assessment | PR Status | PR Link |"
          TABLE="${TABLE}\n|---|-----------|-----------|-----------|---------|"

          PR_LINKS=""
          IDX=0

          if [[ "$COUNT" -gt 0 ]]; then
            for REPO in $(echo "$REPO_LIST" | jq -r '.[]'); do
              IDX=$((IDX + 1))

              # Read assessment status
              ASSESS_FILE="/tmp/assess-status/assess-${REPO}.json"
              if [[ -f "$ASSESS_FILE" ]]; then
                ASSESS_STATUS=$(jq -r '.assess_status' "$ASSESS_FILE")
              elif [[ "${{ inputs.dry_run }}" == "true" ]]; then
                ASSESS_STATUS="skipped (dry run)"
              else
                ASSESS_STATUS="no data"
              fi

              # Read PR status
              PR_FILE="/tmp/pr-status/pr-${REPO}.json"
              if [[ -f "$PR_FILE" ]]; then
                PR_STATUS=$(jq -r '.pr_status' "$PR_FILE")
                PR_URL=$(jq -r '.pr_url' "$PR_FILE")
              elif [[ "${{ inputs.dry_run }}" == "true" ]]; then
                PR_STATUS="skipped (dry run)"
                PR_URL=""
              else
                PR_STATUS="no data"
                PR_URL=""
              fi

              # Format status with emoji
              case "$ASSESS_STATUS" in
                success)  ASSESS_DISPLAY="✅ success" ;;
                failure)  ASSESS_DISPLAY="❌ failure" ;;
                *)        ASSESS_DISPLAY="⚪ ${ASSESS_STATUS}" ;;
              esac

              case "$PR_STATUS" in
                created)         PR_DISPLAY="✅ created" ;;
                already_existed) PR_DISPLAY="ℹ️ existed" ;;
                failed)          PR_DISPLAY="❌ failed" ;;
                *)               PR_DISPLAY="⚪ ${PR_STATUS}" ;;
              esac

              if [[ -n "$PR_URL" && "$PR_URL" != "" ]]; then
                PR_LINK="[View PR](${PR_URL})"
                PR_LINKS="${PR_LINKS}\n- **${REPO}**: ${PR_URL}"
              else
                PR_LINK="—"
              fi

              TABLE="${TABLE}\n| ${IDX} | \`${REPO}\` | ${ASSESS_DISPLAY} | ${PR_DISPLAY} | ${PR_LINK} |"
            done
          fi

          # Write to outputs (use file-based approach for multiline)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          {
            echo "table<<EOFTABLE"
            echo -e "$TABLE"
            echo "EOFTABLE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "pr_links<<EOFLINKS"
            if [[ -n "$PR_LINKS" ]]; then
              echo -e "$PR_LINKS"
            else
              echo "_No PRs created in this run._"
            fi
            echo "EOFLINKS"
          } >> "$GITHUB_OUTPUT"

      - name: Final summary
        run: |
          {
            echo "## 🏁 Batch Assessment — Final Summary"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Dry run | \`${{ inputs.dry_run }}\` |"
            echo "| Repos targeted | ${{ needs.discover-and-filter.outputs.count }} |"
            echo "| Estimated time | ~${{ needs.discover-and-filter.outputs.estimated_minutes }} min |"
            echo "| Discovery | \`${{ needs.discover-and-filter.result }}\` |"
            if [[ "${{ inputs.dry_run }}" == "false" ]]; then
              echo "| Assessment | \`${{ needs.assess.result }}\` |"
              echo "| PR creation | \`${{ needs.create-prs.result }}\` |"
            fi
            echo ""
            echo "### 📊 Per-Repository Results"
            echo ""
            echo '${{ steps.results.outputs.table }}'
            echo ""
            echo "### 🔗 Created PRs"
            echo ""
            echo '${{ steps.results.outputs.pr_links }}'
            echo ""
            echo "_Run at $(date -u '+%Y-%m-%d %H:%M UTC') by @${{ github.actor }}_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create summary issue
        if: inputs.dry_run == false
        run: |
          ISSUE_TITLE="📋 Batch Assessment Run — $(date -u '+%Y-%m-%d %H:%M UTC')"

          ISSUE_BODY="## 🏁 Batch Assessment Results

          **Workflow run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Triggered by:** @${{ github.actor }}
          **Language filter:** \`${{ inputs.language_filter }}\`
          **Repos targeted:** ${{ needs.discover-and-filter.outputs.count }}

          ### 📊 Results

          ${{ steps.results.outputs.table }}

          ### 🔗 Pull Requests

          ${{ steps.results.outputs.pr_links }}

          ### Job Status

          | Phase | Status |
          |-------|--------|
          | Discovery | \`${{ needs.discover-and-filter.result }}\` |
          | Assessment | \`${{ needs.assess.result }}\` |
          | PR Creation | \`${{ needs.create-prs.result }}\` |

          ---
          > 🤖 _Automated by [Batch Assessment Pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --label "batch-assessment"  2>/dev/null || \
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY"
