# ============================================================================
# 01-discover-repos.yml — Discovery Workflow
# ============================================================================
# Lists all repositories in the target GitHub organization, shows their
# primary language, and outputs a summary table in the job summary.
#
# Outputs (available to downstream jobs):
#   repo_count — Number of discovered non-archived repositories
#   repo_list  — JSON array of repository names (e.g. ["repo-a","repo-b"])
#
# Artifacts:
#   discovered-repos — Full repos.json with name, language, visibility
#
# Repository variables:
#   TARGET_ORG — GitHub organization to scan
#
# Secrets:
#   GH_PAT — Personal Access Token with repo + read:org scopes
# ============================================================================

name: "01 · Discover Repos"

on:
  workflow_dispatch:
    inputs:
      target_org:
        description: "GitHub org to scan (overrides repo variable TARGET_ORG)"
        required: false
        type: string

# Prevent duplicate discovery runs
concurrency:
  group: discover-repos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: "List organization repositories"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Expose repo count and list so downstream jobs can consume them
    outputs:
      repo_count: ${{ steps.list.outputs.total }}
      repo_list: ${{ steps.list.outputs.repo_list }}

    env:
      # Input takes precedence over the repo variable
      ORG: ${{ inputs.target_org || vars.TARGET_ORG }}
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      # ── Validate inputs ────────────────────────────────────────────────
      - name: Validate organization name
        run: |
          if [[ -z "$ORG" ]]; then
            echo "::error::No target org specified."
            echo "::notice::Troubleshooting: Set the TARGET_ORG repository variable under Settings → Secrets and variables → Actions → Variables, or pass the 'target_org' input when triggering this workflow."
            exit 1
          fi

          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::GH_PAT secret is not set."
            echo "::notice::Troubleshooting: Create a Personal Access Token with 'repo' and 'read:org' scopes, then add it as the GH_PAT repository secret under Settings → Secrets and variables → Actions → Secrets."
            exit 1
          fi

          echo "🏢 Target organization: **$ORG**" >> "$GITHUB_STEP_SUMMARY"

      # ── Fetch repo list via GitHub CLI ─────────────────────────────────
      - name: List repos in organization
        id: list
        run: |
          echo "📡 Fetching repositories for org: $ORG ..."

          # Fetch repos as JSON — name, primary language, visibility, archived flag
          if ! gh repo list "$ORG" \
            --json name,primaryLanguage,visibility,isArchived \
            --limit 1000 \
            --no-archived \
            > repos.json; then
            echo "::error::Failed to list repositories for org '$ORG'."
            echo "::notice::Troubleshooting — common causes:%0A  • GH_PAT may lack required scopes (needs 'repo' and 'read:org').%0A  • The org name '$ORG' may be misspelled.%0A  • The token owner may not have access to this organization.%0A  • GitHub API may be experiencing issues — check https://www.githubstatus.com"
            exit 1
          fi

          # Validate that we got valid JSON back
          if ! jq empty repos.json 2>/dev/null; then
            echo "::error::repos.json is not valid JSON. The API response may be malformed."
            exit 1
          fi

          TOTAL=$(jq length repos.json)
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Build compact JSON array of repo names for downstream consumption
          REPO_LIST=$(jq -c '[.[].name]' repos.json)
          echo "repo_list=$REPO_LIST" >> "$GITHUB_OUTPUT"

          if [[ "$TOTAL" -eq 0 ]]; then
            echo "::warning::No non-archived repositories found in org '$ORG'."
            echo "::notice::Troubleshooting: Verify the org name is correct, that the org contains non-archived repos, and that the GH_PAT token has visibility into the org's repositories."
          elif [[ "$TOTAL" -ge 1000 ]]; then
            echo "::warning::Fetched 1000 repos — results may be truncated. The org may contain more repositories than the current limit."
          fi

          echo "✅ Found $TOTAL non-archived repositories."

      # ── Build summary table ────────────────────────────────────────────
      - name: Generate summary table
        run: |
          TOTAL=${{ steps.list.outputs.total }}

          {
            echo ""
            echo "## 📋 Repository Discovery — \`$ORG\`"
            echo ""
            echo "| # | Repository | Language | Visibility |"
            echo "|---|-----------|----------|------------|"

            # Iterate over repos and build markdown rows
            jq -r 'sort_by(.name) | to_entries[] |
              "| \(.key + 1) | \(.value.name) | \(.value.primaryLanguage.name // "—") | \(.value.visibility) |"
            ' repos.json

            echo ""
            echo "---"
            echo ""

            # Language breakdown
            echo "### 📊 Language Breakdown"
            echo ""
            echo "| Language | Count |"
            echo "|----------|-------|"
            jq -r '
              group_by(.primaryLanguage.name // "Unknown")
              | map({lang: .[0].primaryLanguage.name // "Unknown", count: length})
              | sort_by(-.count)[]
              | "| \(.lang) | \(.count) |"
            ' repos.json

            echo ""
            echo "> **Total non-archived repos: $TOTAL**"
            echo ""
            echo "_Run at $(date -u '+%Y-%m-%d %H:%M UTC') by @${{ github.actor }}_"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "📊 Summary written to job summary."

      # ── Upload artifact for downstream workflows ───────────────────────
      - name: Upload repos.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovered-repos
          path: repos.json
          retention-days: 7
          if-no-files-found: warn
