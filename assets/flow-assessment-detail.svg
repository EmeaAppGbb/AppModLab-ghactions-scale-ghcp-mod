<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <!-- Background -->
  <rect width="900" height="400" fill="#0a0a0a" rx="4"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="17" fill="#00FF41" font-weight="bold">ASSESSMENT PHASE — Detail</text>
  <text x="450" y="55" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#555555">Steps inside a single repository assessment run</text>

  <!-- GitHub Actions Runner container -->
  <rect x="20" y="72" width="860" height="298" rx="8" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="32" y="62" width="250" height="20" rx="4" fill="#0a0a0a"/>
  <text x="42" y="77" font-family="Courier New, Courier, monospace" font-size="12" fill="#00d4ff" font-weight="bold">GitHub Actions Runner</text>

  <!-- ═══════════════════ ROW 1 ═══════════════════ -->

  <!-- Step 1: Clone Repo -->
  <rect x="40" y="110" width="170" height="62" rx="5" fill="#1a1a2e" stroke="#00FF41" stroke-width="1.5"/>
  <text x="125" y="131" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" font-weight="bold">STEP 1</text>
  <text x="125" y="148" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="12" fill="#e0e0e0">Clone Repo</text>
  <text x="125" y="164" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="9" fill="#444444">git clone</text>

  <!-- Arrow 1 → 2 -->
  <line x1="210" y1="141" x2="238" y2="141" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="238,136 248,141 238,146" fill="#00d4ff"/>

  <!-- Step 2: Create Branch -->
  <rect x="248" y="110" width="170" height="62" rx="5" fill="#1a1a2e" stroke="#00FF41" stroke-width="1.5"/>
  <text x="333" y="131" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" font-weight="bold">STEP 2</text>
  <text x="333" y="148" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="12" fill="#e0e0e0">Create Branch</text>
  <text x="333" y="164" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="9" fill="#444444">ghcp-mod</text>

  <!-- Arrow 2 → 3 -->
  <line x1="418" y1="141" x2="446" y2="141" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="446,136 456,141 446,146" fill="#00d4ff"/>

  <!-- Step 3: Install CLI -->
  <rect x="456" y="110" width="175" height="62" rx="5" fill="#1a1a2e" stroke="#00FF41" stroke-width="1.5"/>
  <text x="543" y="131" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" font-weight="bold">STEP 3</text>
  <text x="543" y="148" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="12" fill="#e0e0e0">Install CLI</text>
  <text x="543" y="164" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="9" fill="#444444">modernize CLI</text>

  <!-- Arrow 3 → 4 -->
  <line x1="631" y1="141" x2="654" y2="141" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="654,136 664,141 654,146" fill="#00d4ff"/>

  <!-- Step 4: Run Assessment -->
  <rect x="664" y="110" width="190" height="62" rx="5" fill="#1a1a2e" stroke="#00FF41" stroke-width="1.5"/>
  <text x="759" y="131" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" font-weight="bold">STEP 4</text>
  <text x="759" y="148" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="12" fill="#e0e0e0">Run Assessment</text>
  <text x="759" y="164" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="9" fill="#444444">assess --no-tty</text>

  <!-- ═══════════════ S-CURVE CONNECTOR ═══════════════ -->
  <path d="M 759,172 L 759,218 L 130,218 L 130,258" stroke="#00d4ff" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <polygon points="125,256 130,268 135,256" fill="#00d4ff"/>

  <!-- ═══════════════════ ROW 2 ═══════════════════ -->

  <!-- Step 5: Commit Results -->
  <rect x="40" y="268" width="180" height="62" rx="5" fill="#1a1a2e" stroke="#00FF41" stroke-width="1.5"/>
  <text x="130" y="289" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" font-weight="bold">STEP 5</text>
  <text x="130" y="306" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="12" fill="#e0e0e0">Commit Results</text>
  <text x="130" y="322" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="9" fill="#444444">git add + commit</text>

  <!-- Arrow 5 → 6 -->
  <line x1="220" y1="299" x2="253" y2="299" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="253,294 263,299 253,304" fill="#00d4ff"/>

  <!-- Step 6: Push Branch -->
  <rect x="263" y="268" width="175" height="62" rx="5" fill="#1a1a2e" stroke="#00FF41" stroke-width="1.5"/>
  <text x="350" y="289" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" font-weight="bold">STEP 6</text>
  <text x="350" y="306" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="12" fill="#e0e0e0">Push Branch</text>
  <text x="350" y="322" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="9" fill="#444444">git push ghcp-mod</text>

  <!-- Arrow 6 → 7 -->
  <line x1="438" y1="299" x2="471" y2="299" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="471,294 481,299 471,304" fill="#00d4ff"/>

  <!-- Step 7: Create PR -->
  <rect x="481" y="268" width="175" height="62" rx="5" fill="#1a1a2e" stroke="#00FF41" stroke-width="1.5"/>
  <text x="568" y="289" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" font-weight="bold">STEP 7</text>
  <text x="568" y="306" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="12" fill="#e0e0e0">Create PR</text>
  <text x="568" y="322" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="9" fill="#444444">gh pr create</text>

  <!-- Done indicator -->
  <line x1="656" y1="299" x2="685" y2="299" stroke="#00FF41" stroke-width="2"/>
  <rect x="685" y="286" width="58" height="26" rx="13" fill="#0a0a0a" stroke="#00FF41" stroke-width="1.5"/>
  <text x="714" y="303" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="10" fill="#00FF41">DONE</text>

  <!-- Footer -->
  <text x="450" y="390" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="10" fill="#333333">Executed by 03-run-assessment.yml (single) or 05-batch-assessment.yml (batch)</text>
</svg>
