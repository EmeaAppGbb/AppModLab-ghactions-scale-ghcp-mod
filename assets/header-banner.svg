<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <title>GHCP Modernization Lab</title>
  <desc>Scale GitHub Copilot App Modernization Across Your Org — retro terminal header banner</desc>
  <defs>
    <!-- CRT glow filter for green text -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- CRT glow filter for cyan text -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle outer glow for the terminal frame -->
    <filter id="frameGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- CRT vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset="85%" stop-color="#0a0a0a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>
    <!-- Screen inner gradient -->
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#06060c"/>
    </linearGradient>
    <!-- Scanline pattern -->
    <pattern id="scanlines" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="2" fill="transparent"/>
      <rect y="2" width="900" height="2" fill="#000000" opacity="0.15"/>
    </pattern>
    <!-- Dot grid pattern -->
    <pattern id="dotgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#00FF41" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Outer background -->
  <rect width="900" height="300" fill="#0a0a0a"/>

  <!-- Terminal bezel / frame -->
  <rect x="12" y="12" width="876" height="276" rx="16" ry="16" fill="none" stroke="#1a3a1a" stroke-width="2" filter="url(#frameGlow)" opacity="0.7"/>

  <!-- Screen area -->
  <rect x="20" y="20" width="860" height="260" rx="12" ry="12" fill="url(#screenBg)"/>

  <!-- Dot grid overlay -->
  <rect x="20" y="20" width="860" height="260" rx="12" ry="12" fill="url(#dotgrid)"/>

  <!-- CRT vignette -->
  <rect x="20" y="20" width="860" height="260" rx="12" ry="12" fill="url(#vignette)"/>

  <!-- Top bar — terminal chrome -->
  <rect x="20" y="20" width="860" height="32" rx="12" ry="0" fill="#111118"/>
  <rect x="20" y="40" width="860" height="12" fill="#111118"/>
  <!-- Window buttons -->
  <circle cx="46" cy="38" r="6" fill="#ff5f56" opacity="0.9"/>
  <circle cx="66" cy="38" r="6" fill="#ffbd2e" opacity="0.9"/>
  <circle cx="86" cy="38" r="6" fill="#27c93f" opacity="0.9"/>
  <!-- Title bar text -->
  <text x="450" y="42" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="11" fill="#555566">ghcp-modernization-lab — bash — 120x40</text>

  <!-- Prompt line -->
  <text x="48" y="88" font-family="Courier New, Courier, monospace" font-size="13" fill="#27c93f" opacity="0.8">user@modernize-lab:~$</text>
  <text x="238" y="88" font-family="Courier New, Courier, monospace" font-size="13" fill="#cccccc" opacity="0.6">cat banner.txt</text>

  <!-- Main title -->
  <text x="450" y="148" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="40" font-weight="bold" fill="#00FF41" filter="url(#glowGreen)">GHCP Modernization Lab</text>

  <!-- Decorative line -->
  <line x1="140" y1="170" x2="760" y2="170" stroke="#00FF41" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="174" x2="720" y2="174" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

  <!-- Subtitle -->
  <text x="450" y="205" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="16" fill="#00d4ff" filter="url(#glowCyan)">Scale GitHub Copilot App Modernization Across Your Org</text>

  <!-- Bottom decorative elements -->
  <text x="48" y="248" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" opacity="0.4">[discover]</text>
  <text x="148" y="248" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" opacity="0.4">[filter]</text>
  <text x="228" y="248" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" opacity="0.4">[assess]</text>
  <text x="318" y="248" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" opacity="0.4">[review]</text>

  <!-- Status indicators -->
  <text x="852" y="248" text-anchor="end" font-family="Courier New, Courier, monospace" font-size="11" fill="#00d4ff" opacity="0.3">v1.0</text>
  <text x="700" y="248" text-anchor="end" font-family="Courier New, Courier, monospace" font-size="11" fill="#00FF41" opacity="0.3">STATUS: READY</text>

  <!-- Block cursor -->
  <rect x="332" y="80" width="8" height="14" fill="#00FF41" opacity="0.7"/>

  <!-- Scanline overlay (on top of everything) -->
  <rect x="20" y="20" width="860" height="260" rx="12" ry="12" fill="url(#scanlines)"/>
</svg>