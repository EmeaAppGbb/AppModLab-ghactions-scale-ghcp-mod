<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <title>Phase 1: Discovery</title>
  <desc>Terminal-style badge for the Discovery phase of GHCP Modernization</desc>
  <defs>
    <filter id="glowG" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="sl" width="400" height="4" patternUnits="userSpaceOnUse">
      <rect width="400" height="2" fill="transparent"/>
      <rect y="2" width="400" height="2" fill="#000" opacity="0.12"/>
    </pattern>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="80" rx="8" ry="8" fill="url(#bg1)"/>
  <rect width="400" height="80" rx="8" ry="8" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.4"/>

  <!-- Left accent bar -->
  <rect x="0" y="16" width="4" height="48" rx="2" fill="#00FF41" opacity="0.8"/>

  <!-- Phase number badge -->
  <rect x="18" y="18" width="44" height="44" rx="6" fill="#00FF41" opacity="0.12"/>
  <text x="40" y="47" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="20" font-weight="bold" fill="#00FF41" filter="url(#glowG)">01</text>

  <!-- Prompt indicator -->
  <text x="76" y="36" font-family="Courier New, Courier, monospace" font-size="14" fill="#00FF41" opacity="0.6">$</text>

  <!-- Phase title -->
  <text x="96" y="36" font-family="Courier New, Courier, monospace" font-size="12" fill="#555566">Phase 1:</text>
  <text x="96" y="56" font-family="Courier New, Courier, monospace" font-size="18" font-weight="bold" fill="#00FF41" filter="url(#glowG)">Discovery</text>

  <!-- Signal icon (simple antenna shape) -->
  <g transform="translate(340, 24)" opacity="0.5">
    <circle cx="16" cy="24" r="3" fill="#00d4ff"/>
    <path d="M8 16 Q16 4 24 16" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <path d="M4 10 Q16 -6 28 10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Scanlines -->
  <rect width="400" height="80" rx="8" ry="8" fill="url(#sl)"/>
</svg>