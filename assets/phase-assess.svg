<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <title>Phase 3: Assessment</title>
  <desc>Terminal-style badge for the Assessment phase of GHCP Modernization</desc>
  <defs>
    <filter id="glowG" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="sl" width="400" height="4" patternUnits="userSpaceOnUse">
      <rect width="400" height="2" fill="transparent"/>
      <rect y="2" width="400" height="2" fill="#000" opacity="0.12"/>
    </pattern>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="80" rx="8" ry="8" fill="url(#bg3)"/>
  <rect width="400" height="80" rx="8" ry="8" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.4"/>

  <!-- Left accent bar -->
  <rect x="0" y="16" width="4" height="48" rx="2" fill="#00FF41" opacity="0.8"/>

  <!-- Phase number badge -->
  <rect x="18" y="18" width="44" height="44" rx="6" fill="#00FF41" opacity="0.12"/>
  <text x="40" y="47" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="20" font-weight="bold" fill="#00FF41" filter="url(#glowG)">03</text>

  <!-- Prompt indicator -->
  <text x="76" y="36" font-family="Courier New, Courier, monospace" font-size="14" fill="#00FF41" opacity="0.6">$</text>

  <!-- Phase title -->
  <text x="96" y="36" font-family="Courier New, Courier, monospace" font-size="12" fill="#555566">Phase 3:</text>
  <text x="96" y="56" font-family="Courier New, Courier, monospace" font-size="18" font-weight="bold" fill="#00FF41" filter="url(#glowG)">Assessment</text>

  <!-- Flask/beaker icon (simple geometric) -->
  <g transform="translate(340, 22)" opacity="0.5">
    <path d="M12 4 L12 18 L4 32 L28 32 L20 18 L20 4 Z" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="9" y1="4" x2="23" y2="4" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="8" y1="24" x2="24" y2="24" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <circle cx="12" cy="28" r="1.5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="18" cy="27" r="1" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Scanlines -->
  <rect width="400" height="80" rx="8" ry="8" fill="url(#sl)"/>
</svg>